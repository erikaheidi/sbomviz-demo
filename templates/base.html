{% macro github_link() %}
<a
  href="https://github.com/chainguard-demo/sbomviz"
  target="_blank"
  rel="noopener noreferrer"
  class="inline-flex items-center gap-1.5 text-slate-400 transition-colors hover:text-sky-300"
>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4 shrink-0" aria-hidden="true">
    <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
  </svg>
  GitHub Repo
</a>
{% endmacro %}

<!doctype html>
<html lang="en" class="h-full" id="top">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}sbomviz{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body class="min-h-full bg-slate-950 text-slate-100 font-sans antialiased">
    <div class="pointer-events-none fixed inset-0 overflow-hidden" aria-hidden="true">
      <div class="absolute -top-40 -right-32 h-96 w-96 rounded-full bg-sky-500/10 blur-3xl"></div>
      <div class="absolute -bottom-48 -left-32 h-96 w-96 rounded-full bg-indigo-500/10 blur-3xl"></div>
    </div>

    <div class="relative">
      <header class="border-b border-slate-800/80 bg-slate-950/80 backdrop-blur-sm">
        <div class="mx-auto grid max-w-6xl grid-cols-2 items-center gap-4 px-4 py-2 sm:px-6">
          <div class="flex min-w-0 items-center">
            <a href="{{ url_for('index') }}" class="group inline-block no-underline">
              <img
                src="{{ url_for('static', filename='logo_sbomviz.png') }}"
                alt="sbomviz"
                class="block h-10 w-auto max-w-full object-contain object-left transition-opacity group-hover:opacity-90 sm:h-12"
              >
            </a>
          </div>
          <nav aria-label="Header navigation" class="flex min-w-0 flex-row flex-wrap items-center justify-end gap-4 text-sm sm:gap-6">
            {% block header_menu %}{% endblock %}
            {{ github_link() }}
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 sm:py-10">
        {% block content %}{% endblock %}
      </main>

      <footer class="border-t border-slate-800/80 bg-slate-950/80 backdrop-blur-sm">
        <div class="mx-auto grid max-w-6xl grid-cols-1 items-center gap-4 px-4 py-6 sm:grid-cols-2 sm:px-6">
          <p class="text-sm text-slate-500">
            &copy; {{ current_year() }} sbomviz. All rights reserved.
          </p>
          <nav aria-label="Footer navigation" class="flex min-w-0 flex-row flex-wrap items-center gap-4 text-sm sm:justify-end sm:gap-6">
            {{ self.header_menu() }}
            {{ github_link() }}
            <a
              href="#top"
              class="inline-flex items-center gap-1.5 text-slate-400 transition-colors hover:text-sky-300"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-4 w-4 shrink-0" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
              </svg>
              Back to top
            </a>
          </nav>
        </div>
      </footer>
    </div>
  </body>
</html>
